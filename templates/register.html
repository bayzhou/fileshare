<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FileTransfer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="logo">📁</div>
            <h1 data-i18n="auth.regTitle">用户注册</h1>
            <p class="subtitle" data-i18n="auth.regSubtitle">创建您的账号</p>

            <div class="form-group">
                <label data-i18n="auth.username">用户名</label>
                <input type="text" id="username" data-i18n-placeholder="auth.inputUsername" placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label data-i18n="auth.password">密码</label>
                <input type="password" id="password" data-i18n-placeholder="auth.inputPassword" placeholder="请输入密码" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label data-i18n="auth.confirmPwd">确认密码</label>
                <input type="password" id="confirm_password" data-i18n-placeholder="auth.confirmPassword" placeholder="再次输入密码" autocomplete="new-password">
            </div>
            <button class="btn btn-primary" onclick="doRegister()" data-i18n="auth.register">注 册</button>
            <div class="auth-footer">
                <a href="/login" data-i18n="auth.hasAccount">已有账号？返回登录</a>
            </div>
            <div class="lang-switch-auth">
                <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
                <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        async function doRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            if (!username || !password || !confirm) { showToast(t('toast.regFailed'), 'error'); return; }
            try {
                const resp = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, confirm_password: confirm }) });
                const data = await resp.json();
                if (resp.ok) { showToast(t('toast.regSuccess')); setTimeout(() => window.location.href = '/login', 1000); }
                else { showToast(data.error || t('toast.regFailed'), 'error'); }
            } catch (err) { showToast(t('toast.networkError'), 'error'); }
        }

        document.getElementById('confirm_password').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
    </script>
</body>
</html>
